<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫宮 目喜子 | Official Portfolio</title>
    <!-- シンプルで美しいCSS framework "Bulma" を1行で読み込み -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <style>
        /* あなたの世界観に合わせた深海のダークネイビー背景 */
        body { background-color: #0a1118; color: #e2e8f0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .hero { background: linear-gradient(180deg, #0a1118 0%, #111c24 100%); }
        .title { color: #ffffff !important; font-weight: 300; letter-spacing: 2px; }
        .subtitle { color: #a0aec0 !important; }
        .box { background-color: #17242f; color: #e2e8f0; border: 1px solid #2d3748; }
        .tag.is-dark-custom { background-color: #2d3748; color: #cbd5e0; }
    </style>
</head>
<body>

    <!-- ヘッダー / ヒーローセクション -->
    <section class="hero is-medium py-6">
        <div class="hero-body has-text-centered">
            <h1 class="title is-1">猫宮 目喜子</h1>
            <p class="subtitle is-4">線で紡ぐ物語</p>
            <div class="tags is-centered">
                <span class="tag is-dark-custom">イラストレーター</span>
                <span class="tag is-dark-custom">現代美術作家</span>
                <span class="tag is-dark-custom">ゲームデベロッパー</span>
            </div>
        </div>
    </section>

    <!-- メインコンテンツ -->
    <div class="container px-4 pb-6">
        <div class="columns is-centered">
            <div class="column is-8">
                
                <!-- プロフィール部分 -->
                <div class="box mb-6">
                    <h2 class="title is-4">Profile</h2>
                    <p class="is-size-6 mb-4">
                        美術系大学4年生。歴史、美術、王室、深海生物をこよなく愛し、人間社会に潜む海洋生物たちの日常を描いた作品群を制作しています。
                    </p>
                    <p class="is-size-7 has-text-grey-light">
                        🏆 過去実績：Netflix公式『ウェンズデー』ファンアート選出（公式Youtube紹介&主演俳優コメント獲得）
                    </p>
                </div>

                <!-- ギャラリー・ショップ（予告欄） -->
                <div class="box">
                    <h2 class="title is-4">Works & Shop</h2>
                    <div class="has-text-centered py-5">
                        <p class="mb-4">現在、100日チャレンジにて作品を爆速開発中。</p>
                        <p class="is-size-6 has-text-weight-bold mb-5" style="color: #48c78e;">
                            ✦ 2026年7月21日 BOOTH SHOP グランドオープン予定 ✦
                        </p>
                        <!-- ボタン（現在は仮リンク、来週BOOTHのURLに変えます） -->
                        <a href="https://booth.pm" class="button is-success is-outlined is-medium" target="_blank">
                            BOOTHを開く（準備中）
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
